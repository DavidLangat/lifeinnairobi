name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Project
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Deploy to cPanel via SFTP
        run: |
          sudo apt-get update && sudo apt-get install lftp -y
          lftp -c "
          set sftp:auto-confirm yes
          set sftp:connect-program 'ssh -a -x -p ${{ secrets.CPANEL_PORT }} -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa'
          open sftp://${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}
          mirror -R --delete --parallel=10 out/ public_html/test
          "
